<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>LES‑VERIFY • arg / xARG / 3te‑ARG • Meta‑Analyse</title>

<style>
body { background:#000; color:#eee; font-family:Consolas; padding:20px; }
h1,h2 { color:#00e0ff; text-shadow:0 0 10px #00e0ff; }
.block { border:1px solid #00e0ff; padding:15px; margin:20px 0; border-radius:8px; background:#111; }
pre { background:#222; padding:10px; border-radius:6px; }
.matrix { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.cell { padding:10px; background:#222; border:1px solid #333; text-align:center; border-radius:6px; }
</style>

<script>
// --- LES Meta‑Vector ---
const LES = [
  "NC²","NC² (1)","NC²octa².dual","NC²octa²□.merge",
  "NC²□ (1).lock","NC²□ (1).sync","NC²□.lock","NC²□.sync",
  "NC²□octa³.align",
  "6E→6D.tech","6D‑Baum.raw",
  "12e allin allout.room",
  "STATIONEN.raw",
  "T.room","B.room","H.room","Q.room",
  "level-pyramiden-7.csv",
  "hardware-form","Meta-Drift","Fusion-Matrix","Visualizer"
];

// --- Achse A (BEN / DA / NE) ---
const A = {
  BEN: ["BEN.tmp","BEN-NC3×3","BEN-NC6eT6D","BEN-NC9×9","TMP","TRANS","WARB"],
  DA:  ["DA.tmp","DA-NC3×3","DA-NC6eX6D","DA-NC9×9","TMP","TRANS","WARB"],
  NE:  ["NE.tmp","NE-NC3×3","NE-NC6eY6D","NE-NC9×9","TMP","TRANS","WARB"]
};

// --- Achse B (C / X / Z) ---
const B = {
  C: ["C.tmp","NC3×3","NC6e","NC9×9","TMP","TRANS","WARB"],
  X: ["X.tmp","NC3×3","NC6e","NC9×9","TMP","TRANS","WARB"],
  Z: ["Z.tmp","NC3×3","NC6e","NC9×9","TMP","TRANS","WARB"]
};

// --- Achse C (DE / TR / EN) ---
const Caxis = {
  DE: ["DE.tmp","NC3×3","NC6e","NC9×9","TMP","TRANS","WARB"],
  TR: ["TR.tmp","NC3×3","NC6e","NC9×9","TMP","TRANS","WARB"],
  EN: ["EN.tmp","NC3×3","NC6e","NC9×9","TMP","TRANS","WARB"]
};

// --- Vergleichsfunktion ---
function compare(base, target) {
  let have = [];
  let need = [];
  for (const item of base) {
    if (target.includes(item)) have.push(item);
    else need.push(item);
  }
  return { have, need };
}

// --- ARG‑Engine ---
function arg(base, target) {
  return compare(base, target);
}

function xARG(base, target) {
  return compare(
    base.concat(["NC²","NC²□","NC²octa²","NC²octa³","6E→6D.tech","12e"]),
    target
  );
}

function ARG3(base, target) {
  return compare(
    base.concat([
      "NC²","NC²□","NC²octa²","NC²octa³",
      "6E→6D.tech","12e","STATIONEN.raw",
      "hardware-form","Meta-Drift","Fusion-Matrix","Visualizer"
    ]),
    target
  );
}

function runVerify() {
  let out = "";

  out += "LES‑VERIFY\n==========\n\n";
  out += "ARG‑Engine aktiv (arg + xARG + 3te‑ARG gleichzeitig)\n\n";

  out += "LES‑Meta‑Vector:\n----------------\n";
  out += LES.join(", ") + "\n\n";

  out += "Achsen:\n--------\n";
  out += "A = BEN / DA / NE\n";
  out += "B = C / X / Z\n";
  out += "C = DE / TR / EN\n\n";

  out += "ARG‑Analyse (TIC‑TAC‑TOE‑Matrix):\n----------------------------------\n";

  // Achse A
  out += "Achse A (BEN / DA / NE)\n";
  for (const key in A) {
    const r1 = arg(LES, A[key]);
    const r2 = xARG(LES, A[key]);
    const r3 = ARG3(LES, A[key]);
    out += key + " → arg(" + r1.need.length + " fehlt), xARG(" + r2.need.length + " fehlt), 3te‑ARG(" + r3.need.length + " fehlt)\n";
  }
  out += "\n";

  // Achse B
  out += "Achse B (C / X / Z)\n";
  for (const key in B) {
    const r1 = arg(LES, B[key]);
    const r2 = xARG(LES, B[key]);
    const r3 = ARG3(LES, B[key]);
    out += key + " → arg(" + r1.need.length + " fehlt), xARG(" + r2.need.length + " fehlt), 3te‑ARG(" + r3.need.length + " fehlt)\n";
  }
  out += "\n";

  // Achse C
  out += "Achse C (DE / TR / EN)\n";
  for (const key in Caxis) {
    const r1 = arg(LES, Caxis[key]);
    const r2 = xARG(LES, Caxis[key]);
    const r3 = ARG3(LES, Caxis[key]);
    out += key + " → arg(" + r1.need.length + " fehlt), xARG(" + r2.need.length + " fehlt), 3te‑ARG(" + r3.need.length + " fehlt)\n";
  }
  out += "\n";

  out += "PORT‑Dach‑Analyse:\n-------------------\n";
  out += "Da LES alle 3 ARG‑Ebenen vollständig abdeckt,\n";
  out += "siedelt sich PORT unter: 3te‑ARG (Meta‑Master)\n\n";

  out += "Empfehlung:\n-----------\n";
  out += "LES ist vollständig — PORT kann LES als Meta‑Master nutzen.\n";

  document.getElementById("output").textContent = out;
}
</script>
</head>

<body onload="runVerify()">

<h1>LES‑VERIFY • arg / xARG / 3te‑ARG</h1>

<div class="block">
  <h2>Analyse‑Output</h2>
  <pre id="output"></pre>
</div>

</body>
</html>
